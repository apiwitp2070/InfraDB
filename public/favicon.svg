<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#2563EB"/>
  <!-- Rotated 180deg: bottom ellipse is now on top -->
  <g transform="rotate(180 16 16)">
    <!-- Database cylinder top ellipse -->
    <ellipse cx="16" cy="10" rx="8" ry="3" fill="#93C5FD"/>
    <!-- Database cylinder body -->
    <rect x="8" y="10" width="16" height="5" fill="#60A5FA"/>
    <!-- Database cylinder mid ellipse -->
    <ellipse cx="16" cy="15" rx="8" ry="3" fill="#93C5FD"/>
    <!-- Database cylinder body bottom half -->
    <rect x="8" y="15" width="16" height="5" fill="#3B82F6"/>
    <!-- Database cylinder bottom ellipse -->
    <ellipse cx="16" cy="20" rx="8" ry="3" fill="#BFDBFE"/>
    <!-- Small highlight dot on top -->
    <ellipse cx="19" cy="10" rx="2" ry="1" fill="white" opacity="0.4"/>
  </g>
</svg>
